<!doctype html>

<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="ad.size" content="width=728,height=90" />
    <title></title>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <script src="https://s0.2mdn.net/ads/studio/cached_libs/gsap_3.13_min.js"></script>
    <script type="text/javascript">
      var clickTag = "%%CLICK_URL_UNESC%%";
    </script>
  </head>

  <body onload="init()">
    <div id="main_container">
      <!--start main_container-->
      <div id="main_content" class="">
          <img src="images/bg.jpg" class="bg" alt="" />
          <div class="copy1" id="copy1">
            <div class="line1">Bring your partner in travel.</div>
          </div>
          <div class="copy2 hidden" id="copy2">
            <div class="line1">Earn up to $2,000 in<br><span>companion pass</span> statement credits.</div>
          </div>
          <div class="copy3 hidden" id="copy3">
            <div class="line1">See if you <span>pre-qualify</span> with no<br>impact to your credit score.</div>
          </div>

          <img src="images/tag.png" class="full-width hidden" id="tag" alt="">

          <img src="images/card.png" id="card" alt="" />
          <img src="images/logo.png" class="full-width" id="logo" alt="" />
          <div class="term" id="term">Terms Apply</div>
          <!-- last frame -->
          <div class="last-frame" id="lastFrame">
            <div class="copy4 hidden" id="copy4">
              Reach a new altitude with<br>the <span>JetBlue Premier Card</span>.
            </div>
            <div id="cta" class="hidden">Pre-Qualify Now</div>
          </div>
          <div id="shine"></div>
      </div>

      <div id="default_exit" class="btn"></div>
      <!--end main_container-->
    </div>


    <script type="text/javascript" src="main.js"></script>

    <script type="text/javascript">
      document
        .getElementById("default_exit")
        .addEventListener("click", function () {
          window.open(clickTag, "_blank");
        });
    </script>
  </body>
</html>
